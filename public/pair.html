<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUGGU-MD Pairing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 50%, #1a1a2e, #16213e, #0f3460);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .glass {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 40px 30px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      animation: fadeIn 1s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .brand { text-align: center; margin-bottom: 30px; }
    .brand h1 { font-size: 2.5rem; font-weight: 700; background: linear-gradient(45deg, #f7971e, #ffd200); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .brand p { color: #aaa; font-size: 0.9rem; margin-top: 5px; }
    .owner {
      background: rgba(255,215,0,0.1);
      border-radius: 20px;
      padding: 10px 15px;
      margin-bottom: 25px;
      text-align: center;
      border: 1px solid rgba(255,215,0,0.2);
      color: #ffd700;
      font-size: 0.9rem;
    }
    .input-group { margin-bottom: 20px; }
    .input-group label { color: #ccc; font-size: 0.9rem; display: block; margin-bottom: 6px; }
    .input-group input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
    }
    .input-group input:focus { border-color: #ffd700; background: rgba(255,255,255,0.1); }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      letter-spacing: 1px;
    }
    .btn:hover { transform: scale(1.02); box-shadow: 0 8px 20px rgba(255,215,0,0.3); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .status { margin-top: 20px; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 15px; text-align: center; color: #aaa; font-size: 0.9rem; }
    .code-box {
      background: rgba(0,0,0,0.4);
      border-radius: 20px;
      padding: 15px;
      margin: 20px 0;
      text-align: center;
      border: 1px dashed rgba(255,215,0,0.4);
      display: none;
    }
    .code-box .code { font-size: 2rem; font-weight: 700; color: #ffd700; letter-spacing: 4px; word-break: break-all; }
    .code-box .copy-btn {
      background: rgba(255,215,0,0.2);
      border: none;
      color: #ffd700;
      padding: 8px 20px;
      border-radius: 30px;
      margin-top: 10px;
      cursor: pointer;
      transition: 0.3s;
    }
    .code-box .copy-btn:hover { background: rgba(255,215,0,0.4); }
    .footer { margin-top: 25px; text-align: center; color: #555; font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
    .footer a { color: #ffd700; text-decoration: none; }
    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      border-top-color: #ffd700;
      animation: spin 1s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-text { color: #f44336; margin-top: 10px; }
    .success-text { color: #4caf50; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="glass">
    <div class="brand">
      <h1>ᘋ᎑ԍԍ᎑-Ⲙᴅ</h1>
      <p>WhatsApp Bot Pairing</p>
    </div>
    <div class="owner">
      👑 Owner: 𓆩〭〬🐣⃪⃮⃔⃝꯭꯭〬ꯦ꯭꯭Ꭷɣ֯֯፝֟͠ɛ 𝐁սԍ͢ԍ𝛖
    </div>
    <div class="input-group">
      <label>📱 WhatsApp Number (with country code)</label>
      <input type="tel" id="phone" placeholder="e.g., 918882829982" value="918882829982">
    </div>
    <button class="btn" id="pairBtn">🔑 Generate Pair Code</button>
    <div id="codeContainer" class="code-box">
      <div class="code" id="pairCode">------</div>
      <button class="copy-btn" id="copyBtn">📋 Copy Code</button>
    </div>
    <div class="status">
      <div>🟢 <span id="statusLabel" class="live">Live</span> · <span id="usersCount">0</span> users online</div>
      <div id="statusMessage" class="status-text">Ready to pair</div>
      <div id="errorMessage" class="error-text" style="display:none;"></div>
      <div id="successMessage" class="success-text" style="display:none;"></div>
    </div>
    <div class="footer">
      © 2026 BUGGU-MD · <a href="#" target="_blank">Channel</a> · <a href="#" target="_blank">Group</a>
    </div>
  </div>

  <script>
    const phoneInput = document.getElementById('phone');
    const pairBtn = document.getElementById('pairBtn');
    const codeContainer = document.getElementById('codeContainer');
    const pairCode = document.getElementById('pairCode');
    const copyBtn = document.getElementById('copyBtn');
    const statusLabel = document.getElementById('statusLabel');
    const usersCount = document.getElementById('usersCount');
    const statusMessage = document.getElementById('statusMessage');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');

    // Fake online users
    setInterval(() => {
      usersCount.textContent = Math.floor(Math.random() * 20) + 1;
    }, 5000);

    pairBtn.addEventListener('click', async () => {
      const phone = phoneInput.value.trim();
      if (!phone) {
        showError('❌ Please enter a phone number.');
        return;
      }
      // Hide any previous messages
      hideMessages();
      pairBtn.disabled = true;
      pairBtn.innerHTML = '<span class="loader"></span> Generating...';
      statusMessage.textContent = '⏳ Generating pair code...';

      try {
        const response = await fetch('/pair/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });

        // Check if response is JSON
        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
          // If not JSON, it's likely an HTML error page
          const text = await response.text();
          console.error('Server returned non-JSON:', text);
          showError('❌ Server error: Received HTML instead of JSON. Check your server logs.');
          statusMessage.textContent = '❌ Server error';
          return;
        }

        const data = await response.json();
        if (response.ok && data.code) {
          pairCode.textContent = data.code;
          codeContainer.style.display = 'block';
          showSuccess('✅ Pair code generated! Copy it and use in WhatsApp.');
          statusMessage.textContent = '✅ Code ready';
          statusLabel.textContent = 'Live';
          statusLabel.className = 'live';
        } else {
          showError('❌ ' + (data.error || 'Failed to generate code.'));
          if (data.fallback === 'qr') {
            showError('⚠️ Bot not ready. Please scan QR code from logs.');
          }
        }
      } catch (err) {
        console.error('Fetch error:', err);
        showError('❌ Network error: ' + err.message);
        statusMessage.textContent = '❌ Error';
      } finally {
        pairBtn.disabled = false;
        pairBtn.innerHTML = '🔑 Generate Pair Code';
      }
    });

    copyBtn.addEventListener('click', () => {
      const code = pairCode.textContent;
      if (code && code !== '------') {
        navigator.clipboard.writeText(code).then(() => {
          alert('✅ Code copied!');
        }).catch(() => {
          // Fallback
          const textArea = document.createElement('textarea');
          textArea.value = code;
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand('copy');
          document.body.removeChild(textArea);
          alert('✅ Code copied!');
        });
      }
    });

    function showError(msg) {
      errorMessage.textContent = msg;
      errorMessage.style.display = 'block';
      successMessage.style.display = 'none';
    }

    function showSuccess(msg) {
      successMessage.textContent = msg;
      successMessage.style.display = 'block';
      errorMessage.style.display = 'none';
    }

    function hideMessages() {
      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';
    }
  </script>
</body>
</html>
